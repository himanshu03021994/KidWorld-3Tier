<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid World - Dashboard</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #D6EAF8;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        
        .header-card {
            background: white;
            padding: 20px;
            border-radius: 40px;
            display: inline-block;
            width: 90%;
            max-width: 800px;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .header-card h1 {
            margin: 0;
            color: #2C3E50;
            font-size: 2.2em;
            letter-spacing: 1px;
        }
        
        #loading-status {
            font-size: 1.1em;
            font-weight: bold;
            margin-bottom: 25px;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-block;
            transition: 0.3s;
        }

        .section {
            max-width: 800px;
            margin: 0 auto 30px auto;
            width: 95%;
        }
        .main-bar {
            color: white;
            padding: 15px;
            border-radius: 40px;
            font-size: 1.4em;
            font-weight: bold;
            margin-bottom: 15px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.1);
            text-transform: uppercase;
        }
        .sub-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .sub-btn {
            color: white;
            padding: 18px;
            border-radius: 40px;
            font-size: 1.3em;
            font-weight: bold;
            cursor: pointer;
            border: none;
            box-shadow: 0 5px 0 rgba(0,0,0,0.1);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sub-btn:active { transform: translateY(4px); box-shadow: 0 0 0; }
        .sub-btn:disabled { opacity: 0.6; cursor: not-allowed; }

        .bg-blue { background-color: #3498DB; }
        .bg-blue-light { background-color: #85C1E9; color: #2C3E50; }
        
        .bg-orange { background-color: #F39C12; }
        .bg-orange-light { background-color: #F8C471; color: #2C3E50; }
        
        .bg-pink { background-color: #E84C3D; } 
        .bg-pink-light { background-color: #F1948A; color: white; }

        @media (max-width: 600px) {
            .sub-grid { grid-template-columns: 1fr; }
            .header-card h1 { font-size: 1.8em; }
        }
    </style>
</head>
<body>

    <div class="header-card">
        <h1 id="welcomeText">LOADING...🌈</h1>
    </div>
    
    <div id="loading-status" style="background-color: #FEF9E7; color: #F39C12;">☁️ Connecting to Cloud...</div>

    <div class="section">
        <div class="main-bar bg-blue">ABC ALPHABETS</div>
        <div class="sub-grid">
            <button class="sub-btn bg-blue-light" onclick="startGame('abc_easy')">A - M 🍎</button>
            <button class="sub-btn bg-blue-light" onclick="startGame('abc_hard')">N - Z 🦓</button>
        </div>
    </div>

    <div class="section">
        <div class="main-bar bg-orange">123 NUMBERS</div>
        <div class="sub-grid">
            <button class="sub-btn bg-orange-light" onclick="startGame('num_easy')">1 - 10 🔟</button>
            <button class="sub-btn bg-orange-light" onclick="startGame('num_hard')">11 - 20 🔢</button>
        </div>
    </div>

    <div class="section">
        <div class="main-bar bg-pink" id="regionalTitle">REGIONAL WORLD</div>
        <div class="sub-grid" id="regionalButtons">
            <button id="regBtn1" class="sub-btn bg-pink-light" onclick="startGame('reg_1')" disabled>Loading...</button>
            <button id="regBtn2" class="sub-btn bg-pink-light" onclick="startGame('reg_2')" disabled>Loading...</button>
        </div>
    </div>

    <script>
        const kidName = localStorage.getItem('kidName') || "Explorer";
        const userState = localStorage.getItem('kidState') || "Bihar";
        document.getElementById('welcomeText').innerText = kidName.toUpperCase() + "'S WORLD 🌈";

        async function preFetchGameData() {
            const statusLabel = document.getElementById('loading-status');
            
            try {
                // Fixed URL to match your Live Render Service
                const apiUrl = `https://kidworld.onrender.com/get-alphabet?state=${encodeURIComponent(userState)}`;
                
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });

                if (!response.ok) throw new Error('Server error');

                const gameData = await response.json();
                
                localStorage.setItem('cloudGameData', JSON.stringify(gameData));
                updateRegionalUI(gameData);
                
                statusLabel.innerText = "✅ Cloud Synced Successfully!";
                statusLabel.style.backgroundColor = "#D4EFDF";
                statusLabel.style.color = "#1D8348";
                
            } catch (error) {
                console.error("Cloud connection failed:", error);
                statusLabel.innerText = "📡 Server Waking Up... Please Wait";
                statusLabel.style.backgroundColor = "#FADBD8";
                statusLabel.style.color = "#943126";
                
                // Retry after 5 seconds if it's a cold start
                setTimeout(preFetchGameData, 5000);
            }
        }

        function updateRegionalUI(data) {
            document.getElementById('regionalTitle').innerText = (data.script || "REGIONAL") + " WORLD";
            
            const btn1 = document.getElementById('regBtn1');
            const btn2 = document.getElementById('regBtn2');

            if (data.alphabets && data.alphabets.length > 0) {
                const mid = Math.floor(data.alphabets.length / 2);
                btn1.innerText = `${data.alphabets[0]} - ${data.alphabets[mid-1]}`;
                btn2.innerText = `${data.alphabets[mid]} - ${data.alphabets[data.alphabets.length-1]}`;
                
                btn1.disabled = false;
                btn2.disabled = false;
            }
        }

        function startGame(mode) {
            localStorage.setItem('selectedMode', mode);
            window.location.href = "game.html"; 
        }

        window.onload = preFetchGameData;
    </script>
</body>
</html>
