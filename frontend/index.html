<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid World - Welcome!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #fff 10%, transparent 11%), radial-gradient(circle, #fff 10%, transparent 11%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }
        .login-card {
            background-color: white;
            padding: 40px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 400px;
            width: 90%;
            border: 5px solid #FFB6C1;
        }
        h1 { color: #FF6347; margin-top: 0; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { color: #32CD32; font-weight: bold; display: block; margin-bottom: 5px;}
        input, select { 
            width: 100%; padding: 10px; border: 3px solid #FFD700; 
            border-radius: 10px; box-sizing: border-box; font-size: 1em;
        }
        .play-btn {
            background-color: #32CD32; color: white; border: none; padding: 15px;
            font-size: 1.5em; border-radius: 20px; cursor: pointer; width: 100%;
            font-weight: bold; box-shadow: 0 5px 0 #228B22; margin-top: 10px;
        }
        .play-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #228B22; }
        #resultArea { display: none; margin-top: 20px; padding: 20px; background: #e0f7fa; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🎈 Kid World 🎈</h1>
        
        <form id="kidForm">
            <div class="input-group">
                <label>Kid's Name:</label>
                <input type="text" id="kidName" required>
            </div>
            <div class="input-group">
                <label>Age:</label>
                <select id="kidAge" required>
                    <option value="2">2</option>
                    <option value="3" selected>3</option>
                    <option value="4">4</option>
                    <option value="5">5+</option>
                </select>
            </div>
            <div class="input-group">
                <label>Mobile Number:</label>
                <input type="text" id="mobile" required>
            </div>
            <div class="input-group">
                <label>Town:</label>
                <input type="text" id="town" placeholder="e.g., Patna" required>
            </div>
            <div class="input-group">
                <label>State:</label>
                <select id="state" required>
                    <option value="Bihar">Bihar</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Gujarat">Gujarat</option>
                    <option value="Delhi">Delhi</option>
                </select>
            </div>
            <button type="submit" class="play-btn">Let's Play! 🚀</button>
        </form>

        <div id="resultArea">
            <h2 id="welcomeMessage" style="color: #FF6347;"></h2>
            <p style="font-size: 1.2em;">Loading <strong id="languageText"></strong>...</p>
            <h3 id="moduleText" style="color: #32CD32;"></h3>
        </div>
    </div>

    <script>
        document.getElementById('kidForm').addEventListener('submit', function(event) {
    event.preventDefault(); // Stops the page from refreshing

    // 1. Get user inputs
    const kidName = document.getElementById('kidName').value;
    const state = document.getElementById('state').value;

    // 2. Decide Language logically based on State
    let language = "Hindi";
    let moduleText = "Varnamala";
    
    if(state === "Punjab") { language = "Punjabi"; moduleText = "Gurmukhi"; }
    else if(state === "Maharashtra") { language = "Marathi"; moduleText = "Mulakhshare"; }
    else if(state === "Gujarat") { language = "Gujarati"; moduleText = "Kakko"; }

    // 3. Show Loading Screen
    document.getElementById('kidForm').style.display = 'none';
    document.getElementById('resultArea').style.display = 'block';
    
    document.getElementById('welcomeMessage').innerText = "Welcome " + kidName + "!";
    document.getElementById('languageText').innerText = language;
    document.getElementById('moduleText').innerText = moduleText;

    // 4. Save data for the Dashboard (Crucial Step!)
    localStorage.setItem('kidName', kidName);
    localStorage.setItem('kidState', state);
    localStorage.setItem('kidLanguage', language);

    // 5. Teleport to Dashboard after 3 seconds
    setTimeout(() => {
        window.location.href = "dashboard.html";
    }, 3000);
});
    </script>
</body>
</html>
