<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid World - Playing...</title>
    <style>
        body {
            font-family: 'Arial Unicode MS', 'Comic Sans MS', sans-serif;
            background-color: #F7DC6F;
            text-align: center;
            margin: 0;
            padding: 20px;
            transition: direction 0.5s ease; /* Smooth flip for RTL */
        }
        .game-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding: 10px;
            background: #fef9e7;
            border-radius: 15px;
        }
        .target-box {
            font-size: 5em;
            background: #EBEDEF;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            color: #2C3E50;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .btn-option {
            font-size: 2.5em;
            padding: 20px;
            border: none;
            border-radius: 15px;
            background: #3498DB;
            color: white;
            cursor: pointer;
            box-shadow: 0 5px 0 #2980B9;
            transition: 0.1s;
        }
        .btn-option:active { transform: translateY(4px); box-shadow: 0 1px 0 #2980B9; }
        
        /* Urdu/RTL Logic */
        .rtl-mode { direction: rtl; text-align: right; }
    </style>
</head>
<body>

<div class="game-container" id="mainContainer">
    <div class="stats-bar">
        <span>🪙 <span id="coins">0</span></span>
        <span>❤️❤️❤️</span>
    </div>

    <div class="target-box" id="targetLetter">?</div>
    <h2 id="instruction">Find the letter!</h2>

    <div class="grid" id="optionsGrid">
        </div>
</div>

<script>
    let currentData = null;
    let target = "";
    let coins = 0;

    // 1. Initialize Game with 11-Script Support
    function initGame() {
        const rawData = localStorage.getItem('cloudGameData');
        if (!rawData) {
            alert("No data found! Please go back to Dashboard.");
            return;
        }
        currentData = JSON.parse(rawData);

        // RTL Support Check (Urdu Logic)
        if (currentData.direction === "rtl") {
            document.body.classList.add('rtl-mode');
            document.getElementById('mainContainer').classList.add('rtl-mode');
        }

        generateRound();
    }

    // 2. Generate Round (6 Button Logic)
    function generateRound() {
        const alphabets = currentData.alphabets;
        target = alphabets[Math.floor(Math.random() * alphabets.length)];
        document.getElementById('targetLetter').innerText = target;

        // Shuffle and pick 5 wrong ones
        let options = [target];
        while (options.length < 6) {
            let randomChar = alphabets[Math.floor(Math.random() * alphabets.length)];
            if (!options.includes(randomChar)) options.push(randomChar);
        }
        options.sort(() => Math.random() - 0.5);

        // Render Buttons
        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = "";
        options.forEach(char => {
            const btn = document.createElement('button');
            btn.className = "btn-option";
            btn.innerText = char;
            btn.onclick = () => checkAnswer(char, btn);
            grid.appendChild(btn);
        });

        // Voice Engine Call
        speak(`Find ${target}`);
    }

    // 3. AI Voice Engine (Regional Accent Support)
    function speak(text) {
        const msg = new SpeechSynthesisUtterance(text);
        msg.lang = currentData.langCode; // e.g., 'hi-IN', 'pa-IN', 'ur-IN'
        msg.rate = 0.9; // Slightly slower for kids
        window.speechSynthesis.speak(msg);
    }

    // 4. Check Answer
    function checkAnswer(selected, btn) {
        if (selected === target) {
            coins += 10;
            document.getElementById('coins').innerText = coins;
            btn.style.backgroundColor = "#27AE60";
            speak("Correct!");
            setTimeout(generateRound, 1000);
        } else {
            btn.style.backgroundColor = "#E74C3C";
            speak("Try again!");
        }
    }

    window.onload = initGame;
</script>

</body>
</html>
