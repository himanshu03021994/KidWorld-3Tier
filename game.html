<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid World - Learning Mode</title>
    <style>
        body {
            font-family: 'Arial Unicode MS', 'Comic Sans MS', sans-serif;
            background-color: #F7DC6F;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        .game-container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }
        .stats-bar {
            display: flex;
            justify-content: space-between;
            font-size: 1.5em;
            margin-bottom: 20px;
            padding: 10px 20px;
            background: #fef9e7;
            border-radius: 20px;
        }
        .target-box {
            font-size: 6em;
            background: #EBEDEF;
            padding: 30px;
            border-radius: 25px;
            margin-bottom: 20px;
            color: #2C3E50;
            border: 4px dashed #BDC3C7;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .btn-option {
            font-size: 2.5em;
            padding: 20px;
            border: none;
            border-radius: 20px;
            background: #3498DB;
            color: white;
            cursor: pointer;
            box-shadow: 0 6px 0 #2980B9;
            transition: 0.1s;
        }
        .btn-option:active { transform: translateY(4px); box-shadow: 0 2px 0 #2980B9; }
        
        /* Special class for Urdu/RTL */
        .rtl-layout { direction: rtl; }
    </style>
</head>
<body>

<div class="game-container" id="gameArea">
    <div class="stats-bar">
        <span>🪙 <span id="coinCount">0</span></span>
        <button onclick="window.location.href='dashboard.html'" style="border:none; background:none; cursor:pointer; font-size:1em;">🏠 Back</button>
    </div>

    <div class="target-box" id="targetDisplay">?</div>
    <h2 id="msgLabel" style="color: #7F8C8D;">Listen and Find!</h2>

    <div class="grid" id="optionsGrid"></div>
</div>

<script>
    let gameData = null;
    let targetLetter = "";
    let totalCoins = parseInt(localStorage.getItem('savedCoins')) || 0;

    function init() {
        const raw = localStorage.getItem('cloudGameData');
        if (!raw) {
            window.location.href = "dashboard.html";
            return;
        }
        gameData = JSON.parse(raw);
        document.getElementById('coinCount').innerText = totalCoins;

        // Apply RTL if Urdu
        if(gameData.direction === "rtl") {
            document.getElementById('gameArea').classList.add('rtl-layout');
        }

        nextRound();
    }

    function nextRound() {
        const chars = gameData.alphabets;
        targetLetter = chars[Math.floor(Math.random() * chars.length)];
        document.getElementById('targetDisplay').innerText = targetLetter;

        // Shuffle options
        let options = [targetLetter];
        while(options.length < 6) {
            let r = chars[Math.floor(Math.random() * chars.length)];
            if(!options.includes(r)) options.push(r);
        }
        options.sort(() => Math.random() - 0.5);

        const grid = document.getElementById('optionsGrid');
        grid.innerHTML = "";
        options.forEach(c => {
            const b = document.createElement('button');
            b.className = "btn-option";
            b.innerText = c;
            b.onclick = () => check(c, b);
            grid.appendChild(b);
        });

        announce(`Find ${targetLetter}`);
    }

    function announce(txt) {
        const utterance = new SpeechSynthesisUtterance(txt);
        utterance.lang = gameData.langCode;
        utterance.rate = 0.8;
        window.speechSynthesis.speak(utterance);
    }

    function check(val, btn) {
        if(val === targetLetter) {
            totalCoins += 10;
            localStorage.setItem('savedCoins', totalCoins); // Permanent Save!
            document.getElementById('coinCount').innerText = totalCoins;
            btn.style.backgroundColor = "#27AE60";
            announce("Wah! Correct.");
            setTimeout(nextRound, 1000);
        } else {
            btn.style.backgroundColor = "#E74C3C";
            announce("Try again.");
            setTimeout(() => btn.style.backgroundColor = "#3498DB", 500);
        }
    }

    window.onload = init;
</script>
</body>
</html>
