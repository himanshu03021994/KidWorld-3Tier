<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kid World - Welcome!</title>
    <style>
        body {
            font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
            background-color: #87CEEB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle, #fff 10%, transparent 11%), radial-gradient(circle, #fff 10%, transparent 11%);
            background-size: 60px 60px;
            background-position: 0 0, 30px 30px;
        }
        .login-card {
            background-color: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 420px;
            width: 90%;
            border: 5px solid #FFB6C1;
            margin: 20px 0;
        }
        h1 { color: #FF6347; margin-bottom: 20px; font-size: 2.2em; }
        .input-group { margin-bottom: 15px; text-align: left; }
        label { color: #32CD32; font-weight: bold; display: block; margin-bottom: 5px;}
        input, select { 
            width: 100%; padding: 12px; border: 3px solid #FFD700; 
            border-radius: 12px; box-sizing: border-box; font-size: 1em;
            outline: none;
        }
        .play-btn {
            background-color: #32CD32; color: white; border: none; padding: 15px;
            font-size: 1.5em; border-radius: 20px; cursor: pointer; width: 100%;
            font-weight: bold; box-shadow: 0 5px 0 #228B22; margin-top: 10px;
            transition: 0.2s;
        }
        .play-btn:hover { background-color: #3CB371; }
        .play-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #228B22; }

        .skip-link {
            display: inline-block;
            margin-top: 15px;
            color: #4682B4;
            text-decoration: underline;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
        }
        #resultArea { display: none; margin-top: 20px; padding: 20px; background: #e0f7fa; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="login-card">
        <h1>🎈 Kid World 🎈</h1>
        
        <form id="kidForm">
            <div class="input-group">
                <label>Kid's Name:</label>
                <input type="text" id="kidName" placeholder="Enter Name" required>
            </div>
            
            <div class="input-group">
                <label>Select Your State:</label>
                <select id="state" required>
                    <option value="Bihar">Bihar (Hindi)</option>
                    <option value="Maharashtra">Maharashtra (Marathi)</option>
                    <option value="Punjab">Punjab (Punjabi)</option>
                    <option value="Gujarat">Gujarat (Gujarati)</option>
                    <option value="West Bengal">West Bengal (Bengali)</option>
                    <option value="Tamil Nadu">Tamil Nadu (Tamil)</option>
                    <option value="Telangana">Telangana (Telugu/Urdu)</option>
                    <option value="Karnataka">Karnataka (Kannada)</option>
                    <option value="Kerala">Kerala (Malayalam)</option>
                    <option value="Odisha">Odisha (Odia)</option>
                    <option value="Jharkhand">Jharkhand (Santali)</option>
                    <option value="Delhi">Delhi (Hindi)</option>
                </select>
            </div>

            <button type="submit" class="play-btn">Let's Play! 🚀</button>
            
            <!-- SKIP OPTION FOR GUEST MODE -->
            <div class="skip-link" onclick="skipAndPlay()">Skip & Play as Guest 🏃‍♂️</div>
        </form>

        <div id="resultArea">
            <h2 id="welcomeMessage" style="color: #FF6347;"></h2>
            <p style="font-size: 1.2em;">Setting up your <strong id="languageText"></strong> World...</p>
            <h3 id="moduleText" style="color: #32CD32;"></h3>
        </div>
    </div>

    <script>
        // FORM SUBMISSION LOGIC
        document.getElementById('kidForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const kidName = document.getElementById('kidName').value;
            const state = document.getElementById('state').value;
            saveAndRedirect(kidName, state);
        });

        // SKIP / GUEST LOGIC
        function skipAndPlay() {
            saveAndRedirect("Guest Explorer", "Bihar"); // Default to Bihar/Hindi
        }

        // REUSABLE REDIRECT FUNCTION
        function saveAndRedirect(name, state) {
            // Save to LocalStorage
            localStorage.setItem('kidName', name);
            localStorage.setItem('kidState', state);

            // UI Feedback
            document.getElementById('kidForm').style.display = 'none';
            document.getElementById('resultArea').style.display = 'block';
            document.getElementById('welcomeMessage').innerText = "Namaste, " + name + "!";
            document.getElementById('languageText').innerText = state;

            // Teleport to Dashboard
            setTimeout(() => {
                window.location.href = "dashboard.html";
            }, 2000);
        }
    </script>
</body>
</html>
